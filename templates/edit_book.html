<!DOCTYPE html>
<html>

<head>

<title>

Edit Book

</title>

<style>

body{

    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
    margin:0;

}

.top-logo{

    position:fixed;
    top:10px;
    right:15px;

}

.top-logo img{

    width:90px;
    height:90px;
    border-radius:12px;

}

.container{

    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:
    0px 0px 10px rgba(0,0,0,0.1);

}

h1{

    text-align:center;
    color:darkred;

}

input{

    width:95%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #ccc;

}

button{

    background:darkred;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;

}

button:hover{

    background:red;

}

</style>

</head>

<body>

<div class="top-logo">

<img src="{{ url_for(
'static',
filename='logo.jpeg'
) }}">

</div>

<a href="/book-list">

<button>

← Back To Inventory

</button>

</a>

<div class="container">

<h1>

Edit Book

</h1>

<form method="POST">

<input type="text"
       name="title"
       value="{{ book.title }}"
       placeholder="Book Title">

<input type="text"
       name="author"
       value="{{ book.author }}"
       placeholder="Author">

<input type="text"
       name="publication"
       value="{{ book.publication }}"
       placeholder="Publication">

<input type="number"
       step="0.01"
       name="mrp"
       value="{{ book.mrp }}"
       placeholder="MRP">

<input type="number"
       step="0.01"
       name="discount_percent"
       value="{{ book.discount_percent }}"
       placeholder="Discount %">

<input type="number"
       name="show_quantity"
       value="{{ book.show_quantity }}"
       placeholder="Show Quantity">

<input type="number"
       name="storage_quantity"
       value="{{ book.storage_quantity }}"
       placeholder="Storage Quantity">

<button type="submit">

Save Changes

</button>

</form>

</div>

</body>

</html>
