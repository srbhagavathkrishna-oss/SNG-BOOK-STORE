<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>

Smart Multi Cart POS

</title>

<style>

body{

    margin:0;
    padding:20px;
    background:#f3f4f6;
    font-family:Arial,sans-serif;

}

/* HEADER */

.header{

    background:white;
    padding:25px;
    border-radius:25px;
    margin-bottom:25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:
    0px 0px 20px rgba(0,0,0,0.08);

}

.header h1{

    margin:0;
    font-size:40px;
    color:#111827;

}

.header p{

    color:#6b7280;
    margin-top:10px;

}

.logo img{

    width:90px;
    height:90px;
    border-radius:20px;
    object-fit:cover;

}

/* CART TABS */

.tabs{

    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;

}

.tab-btn{

    border:none;
    padding:14px 22px;
    border-radius:14px;
    background:#dbeafe;
    color:#1e3a8a;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;

}

.active-tab{

    background:#2563eb;
    color:white;

}

/* CART PAGE */

.cart-page{

    background:white;
    border-radius:25px;
    padding:25px;

    box-shadow:
    0px 0px 20px rgba(0,0,0,0.08);

}

/* LAYOUT */

.layout{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:25px;

}

/* SEARCH */

.search-box{

    background:#f9fafb;
    padding:20px;
    border-radius:20px;

}

.search-box h3{

    margin-top:0;

}

.search-box input{

    width:100%;
    padding:16px;
    border-radius:12px;
    border:1px solid #d1d5db;
    box-sizing:border-box;
    margin-bottom:15px;

}

.search-btn{

    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;

}

/* CAMERA */

.camera-section{

    margin-top:20px;

}

video{

    width:100%;
    border-radius:20px;
    background:black;

}

canvas{

    display:none;

}

.camera-buttons{

    display:flex;
    gap:10px;
    margin-top:15px;

}

.camera-buttons button{

    flex:1;

}

/* RESULTS */

.results{

    background:#f9fafb;
    padding:20px;
    border-radius:20px;

}

.book-card{

    background:white;
    padding:18px;
    border-radius:18px;
    margin-bottom:18px;

    box-shadow:
    0px 0px 10px rgba(0,0,0,0.08);

}

.book-card h3{

    margin-top:0;
    color:#111827;

}

.book-card p{

    color:#4b5563;

}

.book-card input{

    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    box-sizing:border-box;
    margin-top:10px;
    margin-bottom:10px;

}

/* BUTTONS */

button{

    border:none;
    cursor:pointer;
    transition:0.3s;

}

.add-btn{

    width:100%;
    background:#10b981;
    color:white;
    padding:14px;
    border-radius:12px;
    font-size:15px;

}

.add-btn:hover{

    background:#059669;

}

/* CART */

.cart-box{

    margin-top:25px;
    background:#f9fafb;
    padding:20px;
    border-radius:20px;

}

.cart-item{

    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;

}

.total{

    font-size:24px;
    font-weight:bold;
    color:#2563eb;

}

.remove-btn{

    background:#ef4444;
    color:white;
    padding:10px 14px;
    border-radius:10px;

}

.complete-btn{

    width:100%;
    margin-top:15px;
    background:#2563eb;
    color:white;
    padding:16px;
    border-radius:14px;
    font-size:16px;

}

/* MOBILE */

@media(max-width:900px){

    .layout{

        grid-template-columns:1fr;

    }

    .header{

        flex-direction:column;
        text-align:center;
        gap:15px;

    }

    .header h1{

        font-size:30px;

    }

}

</style>

</head>

<body>

<div class="header">

    <div>

        <h1>

            Smart Multi Cart POS

        </h1>

        <p>

            Bhagavata Saptaham Book Store

        </p>

    </div>

    <div class="logo">

        <img src="{{ url_for(
        'static',
        filename='logo.jpeg'
        ) }}">

    </div>

</div>

<!-- BOOK DATA -->

<script id="books-data"
        type="application/json">

[
{% for book in books %}

{
"id": {{ book.id }},
"title": "{{ book.title or '' }}",
"author": "{{ book.author or '' }}",
"price": {{ book.final_price or 0 }},
"stock":
{{ (book.show_quantity or 0)
+
(book.storage_quantity or 0) }}
}

{% if not loop.last %},{% endif %}

{% endfor %}
]

</script>

<!-- TABS -->

<div class="tabs">

<button class="tab-btn active-tab"
        onclick="switchCart(1)"
        id="tab1">

Cart 1

</button>

<button class="tab-btn"
        onclick="switchCart(2)"
        id="tab2">

Cart 2

</button>

<button class="tab-btn"
        onclick="switchCart(3)"
        id="tab3">

Cart 3

</button>

</div>

<!-- CARTS -->

{% for cart in [1,2,3] %}

<div class="cart-page"
     id="cartPage{{ cart }}"
     {% if cart != 1 %}
     style="display:none;"
     {% endif %}>

<div class="layout">

<!-- SEARCH SIDE -->

<div>

<div class="search-box">

<h3>

Search Books

</h3>

<input type="text"
       id="search{{ cart }}"
       placeholder="Enter Book Title">

<button class="search-btn"
        onclick="searchBooks({{ cart }})">

Search

</button>

</div>

<div class="camera-section">

<video id="camera{{ cart }}"
       autoplay>

</video>

<canvas id="canvas{{ cart }}">

</canvas>

<div class="camera-buttons">

<button onclick="startCamera({{ cart }})">

Start Camera

</button>

<button onclick="captureImage({{ cart }})">

Capture Image

</button>

</div>

</div>

</div>

<!-- RESULT SIDE -->

<div>

<div class="results">

<h3>

Search Results

</h3>

<div id="result{{ cart }}">

</div>

</div>

<div class="cart-box">

<h3>

Cart Items

</h3>

<div id="cart{{ cart }}">

</div>

<h2 class="total"
    id="total{{ cart }}">

₹0

</h2>

<button class="complete-btn"
        onclick="completeSale({{ cart }})">

Complete Sale

</button>

</div>

</div>

</div>

</div>

{% endfor %}

<script>

const books = JSON.parse(

document.getElementById(
"books-data"
).textContent

);

let carts = {

1: [],
2: [],
3: []

};
let activeCart = 1;

/* SWITCH CART */

function switchCart(cart){

    activeCart = cart;

    for(let i=1;i<=3;i++){

        document.getElementById(
            "cartPage"+i
        ).style.display = "none";

        document.getElementById(
            "tab"+i
        ).classList.remove(
            "active-tab"
        );

    }

    document.getElementById(
        "cartPage"+cart
    ).style.display = "block";

    document.getElementById(
        "tab"+cart
    ).classList.add(
        "active-tab"
    );

}

/* SEARCH BOOKS */

function searchBooks(cart){

    const query =

    document.getElementById(
        "search"+cart
    ).value.toLowerCase();

    const resultDiv =

    document.getElementById(
        "result"+cart
    );

    resultDiv.innerHTML = "";

    if(query == ""){

        resultDiv.innerHTML =

        "<p>Enter Book Title</p>";

        return;

    }

    books.forEach(function(book){

        if(

            book.title
            .toLowerCase()
            .includes(query)

        ){

            resultDiv.innerHTML += `

<div class="book-card">

<h3>

${book.title}

</h3>

<p>

Author:
${book.author}

</p>

<p>

Price:
₹${book.price}

</p>

<p>

Available Stock:
${book.stock}

</p>

<input type="number"
       id="qty${cart}${book.id}"
       value="1"
       min="1">

<button
class="add-btn"
data-cart="${cart}"
data-book="${book.id}">

Add To Cart

</button>

</div>

`;

        }

    });

}

/* ADD TO CART */

document.addEventListener(

    "click",

    function(e){

        if(

            e.target.classList.contains(
                "add-btn"
            )

        ){

            const cart = parseInt(

                e.target.dataset.cart

            );

            const bookId = parseInt(

                e.target.dataset.book

            );

            addToCart(cart,bookId);

        }

    }

);

function addToCart(cart,bookId){

    const qty = parseInt(

        document.getElementById(
            "qty"+cart+bookId
        ).value

    );

    const book = books.find(

        function(b){

            return b.id == bookId;

        }

    );

    if(!book){

        return;

    }

    carts[cart].push({

        id: book.id,

        title: book.title,

        price: book.price,

        quantity: qty

    });

    updateCart(cart);

}

/* UPDATE CART */

function updateCart(cart){

    const cartDiv =

    document.getElementById(
        "cart"+cart
    );

    const totalDiv =

    document.getElementById(
        "total"+cart
    );

    cartDiv.innerHTML = "";

    let total = 0;

    carts[cart].forEach(function(item,index){

        const subtotal =

        item.price *
        item.quantity;

        total += subtotal;

        cartDiv.innerHTML += `

<div class="cart-item">

<h3>

${item.title}

</h3>

<p>

₹${item.price}
×
${item.quantity}

</p>

<p>

Subtotal:
₹${subtotal}

</p>

<button
class="remove-btn"
data-cart="${cart}"
data-index="${index}">

Remove

</button>

</div>

`;

    });

    totalDiv.innerHTML =

    "₹" + total;

}

/* REMOVE */

document.addEventListener(

    "click",

    function(e){

        if(

            e.target.classList.contains(
                "remove-btn"
            )

        ){

            const cart = parseInt(

                e.target.dataset.cart

            );

            const index = parseInt(

                e.target.dataset.index

            );

            removeItem(cart,index);

        }

    }

);

function removeItem(cart,index){

    carts[cart].splice(index,1);

    updateCart(cart);

}

/* COMPLETE SALE */

function completeSale(cart){

    if(

        carts[cart].length == 0

    ){

        alert(
            "Cart Empty"
        );

        return;

    }

    let summary = "";

    let total = 0;

    carts[cart].forEach(function(item){

        const subtotal =

        item.price *
        item.quantity;

        total += subtotal;

        summary +=

        item.title +
        " x " +
        item.quantity +
        " = ₹" +
        subtotal +
        "\n";

    });

    summary +=

    "\nTOTAL = ₹" + total;

    alert(

        "SALE COMPLETED\n\n" +
        summary

    );

    carts[cart] = [];

    updateCart(cart);

}

/* CAMERA */

async function startCamera(cart){

    const video =

    document.getElementById(
        "camera"+cart
    );

    try{

        const stream =

        await navigator
        .mediaDevices
        .getUserMedia({

            video:true

        });

        video.srcObject = stream;

    }

    catch(error){

        alert(
            "Camera Access Denied"
        );

    }

}

function captureImage(cart){

    const video =

    document.getElementById(
        "camera"+cart
    );

    const canvas =

    document.getElementById(
        "canvas"+cart
    );

    const context =

    canvas.getContext("2d");

    canvas.width = 300;

    canvas.height = 400;

    context.drawImage(

        video,
        0,
        0,
        300,
        400

    );

    alert(
        "Image Captured"
    );

}

</script>

</body>

</html>
