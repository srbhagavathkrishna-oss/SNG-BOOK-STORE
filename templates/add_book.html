{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="page-header">

        <h1>

            Add New Book

        </h1>

        <p>

            Add books with complete inventory details

        </p>

    </div>

    <div class="form-card">

        <form method="POST"
              enctype="multipart/form-data">

            <!-- BOOK TITLE -->

            <label>

                Book Title

            </label>

            <input type="text"
                   name="title"
                   placeholder="Enter Book Title"
                   required>

            <!-- AUTHOR -->

            <label>

                Author Name

            </label>

            <input type="text"
                   name="author"
                   placeholder="Enter Author Name"
                   required>

            <!-- PUBLICATION -->

            <label>

                Publication

            </label>

            <input type="text"
                   name="publication"
                   placeholder="Enter Publication"
                   required>

            <!-- CATEGORY -->

            <label>

                Category

            </label>

            <input type="text"
                   name="category"
                   placeholder="Enter Category">

            <!-- LANGUAGE -->

            <label>

                Language

            </label>

            <input type="text"
                   name="language"
                   placeholder="Enter Language">

            <!-- PURCHASE PRICE -->

            <label>

                Purchase Price

            </label>

            <input type="number"
                   step="0.01"
                   name="purchase_price"
                   placeholder="Enter Purchase Price"
                   required>

            <!-- SELLING PRICE -->

            <label>

                Final Selling Price

            </label>
            <!-- DISCOUNT -->

        <label>

    Discount Percentage

</label>

<input type="number"
       id="discount"
       placeholder="Enter Discount %"
       oninput="calculatePrice()">

<!-- USD PRICE -->

<label>

    USD Price

</label>

<input type="number"
       id="usd_price"
       placeholder="Enter USD Amount"
       oninput="convertCurrency()">

<!-- INR CONVERSION -->

<label>

    Converted INR Value

</label>

<input type="text"
       id="converted_inr"
       readonly>
            <input type="number"
                   step="0.01"
                   name="final_price"
                   placeholder="Enter Selling Price"
                   required>

            <!-- SHOW QUANTITY -->

            <label>

                Show Room Quantity

            </label>

            <input type="number"
                   name="show_quantity"
                   placeholder="Enter Show Quantity"
                   required>

            <!-- STORAGE QUANTITY -->

            <label>

                Storage Quantity

            </label>

            <input type="number"
                   name="storage_quantity"
                   placeholder="Enter Storage Quantity"
                   required>

            <!-- SHELF -->

            <label>

                Shelf Number

            </label>

            <select name="shelf_number"
                    required>

                <option value="">

                    Select Shelf

                </option>

                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
                <option>E</option>
                <option>F</option>
                <option>G</option>
                <option>H</option>
                <option>I</option>
                <option>J</option>

            </select>

            <!-- RACK -->

            <label>

                Rack Number

            </label>

            <select name="rack_number"
                    required>

                <option value="">

                    Select Rack

                </option>

                {% for i in range(1,21) %}

                <option>

                    {{ i }}

                </option>

                {% endfor %}

            </select>

            <!-- DESCRIPTION -->

            <label>

                Book Description

            </label>

            <textarea name="description"
                      rows="5"
                      placeholder="Enter Description"></textarea>

            <!-- IMAGE -->

            <label>

                Upload Book Image

            </label>

            <input type="file"
                   name="image"
                   accept="image/*">

            <!-- SUBMIT -->

            <button type="submit"
                    class="submit-btn">

                Add Book

            </button>

        </form>

    </div>

</div>

<style>

/* PAGE */

.container{

    max-width:900px;

    margin:auto;

    padding:20px;

}

/* HEADER */

.page-header{

    text-align:center;

    margin-bottom:30px;

}

.page-header h1{

    font-size:42px;

    color:#111827;

    margin-bottom:10px;

}

.page-header p{

    color:#6b7280;

    font-size:18px;

}

/* CARD */

.form-card{

    background:white;

    padding:35px;

    border-radius:25px;

    box-shadow:
    0px 0px 25px rgba(0,0,0,0.08);

}

/* LABEL */

label{

    display:block;

    margin-top:20px;

    margin-bottom:8px;

    font-weight:bold;

    color:#111827;

    font-size:16px;

}

/* INPUTS */

input,
select,
textarea{

    width:100%;

    padding:15px;

    border-radius:14px;

    border:1px solid #d1d5db;

    font-size:16px;

    box-sizing:border-box;

}

/* TEXTAREA */

textarea{

    resize:none;

}

/* BUTTON */

.submit-btn{

    width:100%;

    margin-top:30px;

    background:#2563eb;

    color:white;

    border:none;

    padding:18px;

    border-radius:16px;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

}

.submit-btn:hover{

    background:#1d4ed8;

    transform:translateY(-2px);

}

/* MOBILE */

@media(max-width:768px){

    .page-header h1{

        font-size:30px;

    }

    .form-card{

        padding:20px;

    }

    input,
    select,
    textarea{

        font-size:18px;

        padding:16px;

    }

    .submit-btn{

        font-size:20px;

    }

}

</style>
<script>

/* DISCOUNT */

function calculatePrice(){

    let purchase = parseFloat(

        document.querySelector(
            'input[name="purchase_price"]'
        ).value

    ) || 0;

    let discount = parseFloat(

        document.getElementById(
            "discount"
        ).value

    ) || 0;

    let finalPrice =

        purchase -
        ((purchase * discount) / 100);

    document.querySelector(

        'input[name="final_price"]'

    ).value = finalPrice.toFixed(2);

}

/* USD TO INR */

async function convertCurrency(){

    let usd = parseFloat(

        document.getElementById(
            "usd_price"
        ).value

    ) || 0;

    try{

        let response = await fetch(

            "https://api.exchangerate-api.com/v4/latest/USD"

        );

        let data = await response.json();

        let rate = data.rates.INR;

        let inr = usd * rate;

        document.getElementById(

            "converted_inr"

        ).value =

        "₹" + inr.toFixed(2);

    }

    catch(error){

        console.log(error);

    }

}

</script>
{% endblock %}
