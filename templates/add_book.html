{% extends "base.html" %}

{% block content %}

<div class="add-book-page">

    <!-- HEADER -->

    <div class="add-book-header">

        <div>

            <h1>

                Add New Book

            </h1>

            <p>

                Smart Inventory & Pricing Management

            </p>

        </div>

    </div>

    <!-- FORM CARD -->

    <div class="add-book-card">

        <form method="POST"
              enctype="multipart/form-data"
              class="modern-form">

            <!-- IMAGE SECTION -->

            <div class="form-section">

                <h2>

                    Book Image

                </h2>

                <p class="section-subtitle">

                    Capture or upload book image

                </p>

                <input type="file"
                       name="image"
                       accept="image/*"
                       capture="environment">

            </div>

            <!-- BASIC DETAILS -->

            <div class="form-section">

                <h2>

                    Basic Details

                </h2>

                <div class="grid-2">

                    <input type="text"
                           name="title"
                           placeholder="Book Title">

                    <input type="text"
                           name="author"
                           placeholder="Author Name">

                    <input type="text"
                           name="publication"
                           placeholder="Publication">

                    <input type="text"
                           name="category"
                           placeholder="Category">

                    <input type="text"
                           name="language"
                           placeholder="Language">

                </div>

            </div>

            <!-- LOCATION -->

            <div class="form-section">

                <h2>

                    Shelf & Rack Location

                </h2>

                <div class="grid-2">

                    <select name="shelf_number">

                        <option value="">

                            Select Shelf

                        </option>

                        <option>A</option>
                        <option>B</option>
                        <option>C</option>
                        <option>D</option>
                        <option>E</option>
                        <option>F</option>
                        <option>G</option>
                        <option>H</option>
                        <option>I</option>
                        <option>J</option>

                    </select>

                    <select name="rack_number">

                        <option value="">

                            Select Rack

                        </option>

                        {% for i in range(1,21) %}

                        <option>

                            {{ i }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <!-- PRICING -->

            <div class="form-section">

                <h2>

                    Smart Pricing

                </h2>

                <div class="grid-2">

                    <input type="number"
                           step="0.01"
                           name="purchase_price"
                           id="purchase_price"
                           placeholder="Purchase Price"
                           required>

                    <input type="number"
                           id="discount"
                           placeholder="Discount %"
                           oninput="calculatePrice()">

                    <input type="number"
                           step="0.01"
                           name="final_price"
                           id="final_price"
                           placeholder="Final Selling Price"
                           required>

                </div>

            </div>

            <!-- MULTI CURRENCY -->

            <div class="form-section">

                <h2>

                    Currency Converter

                </h2>

                <div class="grid-2">

                    <select id="currency"
                            onchange="convertCurrency()">

                        <option value="USD">

                            USD

                        </option>

                        <option value="EUR">

                            EUR

                        </option>

                        <option value="AED">

                            AED

                        </option>

                        <option value="GBP">

                            GBP

                        </option>

                        <option value="SAR">

                            SAR

                        </option>

                        <option value="QAR">

                            QAR

                        </option>

                    </select>

                    <input type="number"
                           id="foreign_amount"
                           placeholder="Enter Amount"
                           oninput="convertCurrency()">

                    <input type="text"
                           id="converted_inr"
                           placeholder="Converted INR"
                           readonly>

                </div>

            </div>

            <!-- STOCK -->

            <div class="form-section">

                <h2>

                    Inventory Stock

                </h2>

                <div class="grid-2">

                    <input type="number"
                           name="show_quantity"
                           placeholder="Show Room Quantity">

                    <input type="number"
                           name="storage_quantity"
                           placeholder="Storage Quantity">

                </div>

            </div>

            <!-- DESCRIPTION -->

            <div class="form-section">

                <h2>

                    Description

                </h2>

                <textarea name="description"
                          rows="5"
                          placeholder="Book Description"></textarea>

            </div>

            <!-- SUBMIT -->

            <button type="submit"
                    class="submit-btn">

                Add Book To Inventory

            </button>

        </form>

    </div>

</div>

<!-- JAVASCRIPT -->

<script>

/* AUTO PRICE */

function calculatePrice(){

    let purchase = parseFloat(

        document.getElementById(
            "purchase_price"
        ).value

    ) || 0;

    let discount = parseFloat(

        document.getElementById(
            "discount"
        ).value

    ) || 0;

    let finalPrice =

        purchase -
        ((purchase * discount) / 100);

    document.getElementById(
        "final_price"
    ).value = finalPrice.toFixed(2);

}

/* MULTI CURRENCY */

async function convertCurrency(){

    let currency =

        document.getElementById(
            "currency"
        ).value;

    let amount = parseFloat(

        document.getElementById(
            "foreign_amount"
        ).value

    ) || 0;

    try{

        let response = await fetch(

            `https://api.exchangerate-api.com/v4/latest/${currency}`

        );

        let data = await response.json();

        let rate = data.rates.INR;

        let inr = amount * rate;

        document.getElementById(
            "converted_inr"
        ).value =

        "₹ " + inr.toFixed(2);

    }

    catch(error){

        console.log(error);

    }

}

</script>

<!-- STYLES -->

<style>

/* PAGE */

.add-book-page{

    padding:30px;

}

/* HEADER */

.add-book-header{

    margin-bottom:30px;

}

.add-book-header h1{

    font-size:48px;

    color:#111827;

    margin-bottom:10px;

}

.add-book-header p{

    font-size:20px;

    color:#6b7280;

}

/* CARD */

.add-book-card{

    background:white;

    border-radius:30px;

    padding:40px;

    box-shadow:
    0px 0px 25px rgba(0,0,0,0.08);

}

/* SECTION */

.form-section{

    margin-bottom:35px;

    padding-bottom:25px;

    border-bottom:1px solid #e5e7eb;

}

.form-section h2{

    font-size:28px;

    margin-bottom:10px;

    color:#111827;

}

.section-subtitle{

    color:#6b7280;

    margin-bottom:20px;

}

/* GRID */

.grid-2{

    display:grid;

    grid-template-columns:
    repeat(auto-fit, minmax(250px,1fr));

    gap:20px;

}

/* INPUTS */

input,
select,
textarea{

    width:100%;

    padding:18px;

    border-radius:16px;

    border:1px solid #d1d5db;

    font-size:17px;

    box-sizing:border-box;

    transition:0.3s;

}

input:focus,
select:focus,
textarea:focus{

    border-color:#2563eb;

    outline:none;

    box-shadow:
    0px 0px 10px rgba(37,99,235,0.2);

}

/* TEXTAREA */

textarea{

    resize:none;

}

/* BUTTON */

.submit-btn{

    width:100%;

    background:#2563eb;

    color:white;

    border:none;

    padding:20px;

    border-radius:18px;

    font-size:22px;

    cursor:pointer;

    transition:0.3s;

}

.submit-btn:hover{

    background:#1d4ed8;

    transform:translateY(-2px);

}

/* MOBILE */

@media(max-width:768px){

    .add-book-page{

        padding:15px;

    }

    .add-book-card{

        padding:20px;

    }

    .add-book-header h1{

        font-size:34px;

    }

    .form-section h2{

        font-size:24px;

    }

    input,
    select,
    textarea{

        font-size:18px;

        padding:18px;

    }

    .submit-btn{

        font-size:20px;

    }

}

</style>

{% endblock %}
