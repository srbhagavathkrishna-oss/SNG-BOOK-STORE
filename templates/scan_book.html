<!DOCTYPE html>
<html>

<head>
    <title>Scan Book</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
.top-logo{

    position:fixed;

    top:10px;

    right:15px;

    z-index:9999;

}

.top-logo img{

    width:65px;

    height:65px;

    object-fit:cover;

    border-radius:12px;

    background:white;

    padding:3px;

    box-shadow:0px 0px 8px rgba(0,0,0,0.3);

    }
<body>
    <div class="top-logo">

    <img src="{{ url_for('static', filename='logo.jpeg') }}">

</div>
    <h1>Scan Book</h1>

    <div class="card">

        <input type="file"><br><br>

        <button>Upload Image</button>

    </div>

</body>

</html>
